<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC Emporium — Knowledge Base</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 720px;
        margin: 60px auto;
        padding: 0 24px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 24px;
      }
      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 32px;
      }
      input {
        flex: 1;
        padding: 10px 14px;
        font-size: 15px;
        border: 1px solid #ccc;
      }
      button {
        padding: 10px 20px;
        font-size: 15px;
        cursor: pointer;
      }
      #answer {
        font-size: 15px;
        line-height: 1.7;
        margin-bottom: 32px;
      }
      .source {
        border: 1px solid #e0e0e0;
        padding: 12px 16px;
        margin-bottom: 8px;
      }
      .source-meta {
        font-size: 12px;
        color: #888;
        margin-bottom: 4px;
      }
      .source-excerpt {
        font-size: 13px;
        color: #444;
      }
      #sources-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #888;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h1>PC Emporium Knowledge Base</h1>

    <div class="input-row">
      <input type="text" id="question" placeholder="Ask a question..." />
      <button onclick="ask()">Ask</button>
    </div>

    <div id="answer"></div>
    <div id="sources-label"></div>
    <div id="sources"></div>

    <script>
      document
        .getElementById("question")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") ask();
        });

      async function ask() {
        const question = document.getElementById("question").value.trim();
        if (!question) return;

        document.getElementById("answer").textContent = "Searching...";
        document.getElementById("sources").innerHTML = "";
        document.getElementById("sources-label").textContent = "";

        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        const data = await response.json();

        document.getElementById("answer").textContent = data.answer;
        document.getElementById("sources-label").textContent =
          "Retrieved chunks";
        document.getElementById("sources").innerHTML = data.sources
          .map(
            (s) => `
        <div class="source">
          <div class="source-meta">${s.source} · ${s.title} · distance: ${s.distance}</div>
          <div class="source-excerpt">${s.excerpt}...</div>
        </div>
      `,
          )
          .join("");
      }
    </script>
  </body>
</html>
